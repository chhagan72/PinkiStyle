version: '3.8'

services:
  frontend:
    build:
      context: ./pinkistyle
      dockerfile: Dockerfile
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always