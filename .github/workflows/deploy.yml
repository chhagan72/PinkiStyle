name: Deploy Fullstack App to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull code from repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js on Runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Build the React Frontend (Navigating into the nested pinkistyle folder)
      - name: Build Frontend
        run: |
          cd pinkistyle
          npm ci
          npm run build   # This creates the 'dist' or 'build' folder inside pinkistyle/

      # 4. Copy all project files to EC2 via SCP
      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          source: ".,!node_modules"
          target: "/var/www/my-app"

      # 5. Connect via SSH and Restart Server Process
      - name: SSH into EC2 and Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            # Navigate explicitly to your server folder on the EC2 instance
            cd /var/www/my-app/server
            
            # Install backend production dependencies cleanly
            if [ -f package-lock.json ]; then
              npm ci --production
            else
              npm install --production
            fi
            
            # Restart the background application via PM2
            pm2 delete app || true
            pm2 start /var/www/my-app/server/server.js --name "app"
            pm2 save